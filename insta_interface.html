<!DOCTYPE html>
<html>
<head>
    <title>Instagram Bot Control</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        .section { margin-bottom: 30px; padding: 20px; border: 1px solid #ddd; }
        .logs-container { 
            background: #000; 
            color: #00ff00; 
            padding: 15px; 
            height: 400px; 
            overflow-y: auto; 
            font-family: monospace; 
            font-size: 12px;
            white-space: pre-wrap;
        }
        .status-display { 
            background: #f5f5f5; 
            padding: 10px; 
            margin: 10px 0; 
            border-left: 4px solid #007cba;
        }
        button { padding: 8px 15px; margin: 5px; background: #007cba; color: white; border: none; cursor: pointer; }
        button:hover { background: #005a8b; }
        input, textarea { padding: 5px; margin: 5px 0; }
        .auto-scroll { margin: 10px 0; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Instagram Bot Control Panel (No name yet)</h1>
        
        <div class="section">
            <h2>Bot Configuration</h2>
            <form id="botForm">
                <label>Cookies JSON File:</label><br>
                <input type="file" id="cookiesFile" accept=".json" required><br><br>
                
                <label>Bot Personality:</label><br>
                <textarea id="botPersonality" rows="4" cols="80" required>You are Nithin responding to Instagram DMs. Be casual, friendly, and authentic. Match the vibe of whoever you're talking to. Keep responses under 40 words and use normal punctuation only.</textarea><br><br>
                
                <label>Users to Monitor (one per line):</label><br>
                <textarea id="monitorUsers" rows="4" cols="40" placeholder="17844616119022755&#10;username2&#10;user_id_123">17844616119022755</textarea><br><br>
                
                <button type="button" onclick="startBot()">Start Bot</button>
                <button type="button" onclick="stopBot()">Stop Bot</button>
                <button type="button" onclick="getBotStatus()">Get Status</button>
            </form>
        </div>
        
        <div class="section">
            <h2>User Management</h2>
            <label>Add User to Monitor:</label><br>
            <input type="text" id="newUser" placeholder="username or user_id">
            <button type="button" onclick="addUser()">Add User</button><br><br>
            
            <label>Remove User:</label><br>
            <input type="text" id="removeUser" placeholder="username or user_id">
            <button type="button" onclick="removeUser()">Remove User</button>
        </div>
        
        <div class="section">
            <h2>Bot Status</h2>
            <div id="status" class="status-display">Bot is not running</div>
            <button type="button" onclick="refreshStatus()">Refresh Status</button>
            <button type="button" onclick="clearLogs()">Clear Logs</button>
        </div>
        
        <div class="section">
            <h2>Real-Time Bot Logs</h2>
            <div class="auto-scroll">
                <label><input type="checkbox" id="autoScroll" checked> Auto-scroll logs</label>
                <label><input type="checkbox" id="autoRefresh" checked> Auto-refresh (every 2 seconds)</label>
            </div>
            <div id="logs" class="logs-container">Waiting for bot logs...</div>
        </div>
    </div>

    <script>
        let logRefreshInterval = null;
        let statusRefreshInterval = null;
        
        // Start auto-refresh when page loads
        window.onload = function() {
            startAutoRefresh();
            getBotStatus();
        };
        
        function startAutoRefresh() {
            // Refresh logs every 2 seconds if auto-refresh is enabled
            if (logRefreshInterval) clearInterval(logRefreshInterval);
            
            logRefreshInterval = setInterval(() => {
                if (document.getElementById('autoRefresh').checked) {
                    fetchLogs();
                }
            }, 2000);
            
            // Refresh status every 5 seconds
            if (statusRefreshInterval) clearInterval(statusRefreshInterval);
            
            statusRefreshInterval = setInterval(() => {
                if (document.getElementById('autoRefresh').checked) {
                    getBotStatus();
                }
            }, 5000);
        }
        
        async function fetchLogs() {
            try {
                const response = await fetch('/bot-status');
                if (response.ok) {
                    const data = await response.json();
                    if (data.details && data.details.logs) {
                        updateLogsDisplay(data.details.logs.join('\n'));
                    }
                }
            } catch (error) {
                // Silently handle errors to avoid spam
            }
        }
        
        function updateLogsDisplay(logs) {
            const logsDiv = document.getElementById('logs');
            const shouldScroll = document.getElementById('autoScroll').checked && 
                                (logsDiv.scrollTop + logsDiv.clientHeight >= logsDiv.scrollHeight - 10);
            
            logsDiv.textContent = logs || 'No logs available';
            
            if (shouldScroll) {
                logsDiv.scrollTop = logsDiv.scrollHeight;
            }
        }
        
        async function startBot() {
            const cookiesFile = document.getElementById('cookiesFile').files[0];
            const personality = document.getElementById('botPersonality').value;
            const users = document.getElementById('monitorUsers').value.split('\n').filter(u => u.trim());
            
            if (!cookiesFile) {
                updateStatus('Please select a cookies JSON file');
                return;
            }
            
            // Validate file type
            if (!cookiesFile.name.toLowerCase().endsWith('.json')) {
                updateStatus('Please select a valid JSON file');
                return;
            }
            
            // Validate file content before sending
            try {
                const fileText = await cookiesFile.text();
                const cookiesData = JSON.parse(fileText);
                
                if (!Array.isArray(cookiesData)) {
                    updateStatus('Invalid cookies file format. Expected an array of cookies.');
                    return;
                }
                
                if (cookiesData.length === 0) {
                    updateStatus('Cookies file is empty');
                    return;
                }
                
                updateStatus(`Found ${cookiesData.length} cookies in file. Starting bot...`);
                
            } catch (error) {
                updateStatus('Invalid JSON file: ' + error.message);
                return;
            }
            
            const formData = new FormData();
            formData.append('cookies', cookiesFile);
            formData.append('personality', personality);
            formData.append('users', JSON.stringify(users));
            formData.append('action', 'start');
            
            try {
                updateStatus('Uploading cookies and starting bot...');
                
                const response = await fetch('/bot-control', {
                    method: 'POST',
                    body: formData
                });
                
                const result = await response.text();
                
                if (response.ok) {
                    updateStatus('✅ Success: ' + result);
                    // Start refreshing logs more frequently when bot is running
                    startAutoRefresh();
                } else {
                    updateStatus('❌ Error: ' + result);
                }
            } catch (error) {
                updateStatus('🚫 Network Error: ' + error.message);
            }
        }
        
        async function stopBot() {
            try {
                const response = await fetch('/bot-control', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({action: 'stop'})
                });
                
                const result = await response.text();
                updateStatus('🛑 ' + result);
            } catch (error) {
                updateStatus('❌ Error: ' + error.message);
            }
        }
        
        async function getBotStatus() {
            try {
                const response = await fetch('/bot-status');
                const data = await response.json();
                
                updateStatus(data.status);
                
                // Update logs if available
                if (data.details && data.details.logs) {
                    updateLogsDisplay(data.details.logs.join('\n'));
                }
            } catch (error) {
                updateStatus('❌ Error getting status: ' + error.message);
            }
        }
        
        function refreshStatus() {
            getBotStatus();
            fetchLogs();
        }
        
        async function addUser() {
            const user = document.getElementById('newUser').value.trim();
            if (!user) return;
            
            try {
                const response = await fetch('/bot-control', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({action: 'add_user', user: user})
                });
                
                const result = await response.text();
                updateStatus('➕ ' + result);
                document.getElementById('newUser').value = '';
            } catch (error) {
                updateStatus('❌ Error: ' + error.message);
            }
        }
        
        async function removeUser() {
            const user = document.getElementById('removeUser').value.trim();
            if (!user) return;
            
            try {
                const response = await fetch('/bot-control', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({action: 'remove_user', user: user})
                });
                
                const result = await response.text();
                updateStatus('➖ ' + result);
                document.getElementById('removeUser').value = '';
            } catch (error) {
                updateStatus('❌ Error: ' + error.message);
            }
        }
        
        function updateStatus(message) {
            const timestamp = new Date().toLocaleTimeString();
            const statusDiv = document.getElementById('status');
            
            statusDiv.innerHTML = `[${timestamp}] ${message}`;
            
            // Log to console for debugging
            console.log(`[${timestamp}] ${message}`);
        }
        
        function clearLogs() {
            document.getElementById('logs').textContent = 'Logs cleared...';
        }
        
        // Add file validation on selection
        document.getElementById('cookiesFile').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                if (file.name.toLowerCase().endsWith('.json')) {
                    updateStatus(`📁 Selected file: ${file.name} (${(file.size/1024).toFixed(2)} KB)`);
                } else {
                    updateStatus('⚠️ Warning: Please select a .json file');
                }
            }
        });
        
        // Handle auto-refresh checkbox changes
        document.getElementById('autoRefresh').addEventListener('change', function(e) {
            if (e.target.checked) {
                startAutoRefresh();
                updateStatus('🔄 Auto-refresh enabled');
            } else {
                if (logRefreshInterval) clearInterval(logRefreshInterval);
                if (statusRefreshInterval) clearInterval(statusRefreshInterval);
                updateStatus('⏸️ Auto-refresh disabled');
            }
        });
    </script>
</body>
</html>
